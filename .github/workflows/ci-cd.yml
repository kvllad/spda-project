name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          for secret_name in VPS_HOST VPS_USER VPS_SSH_KEY VPS_DEPLOY_PATH; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" \
            "GITHUB_REPOSITORY='$GITHUB_REPOSITORY' \
            GITHUB_TOKEN='$GITHUB_TOKEN' \
            VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' \
            bash -se" <<'EOF'
          set -euo pipefail

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "${VPS_DEPLOY_PATH}"

          if [ ! -d "${VPS_DEPLOY_PATH}/.git" ]; then
            git -C "${VPS_DEPLOY_PATH}" init
          fi

          if [ ! -f "${VPS_DEPLOY_PATH}/.env" ]; then
            echo "Missing ${VPS_DEPLOY_PATH}/.env on VPS" >&2
            exit 1
          fi

          git -C "${VPS_DEPLOY_PATH}" fetch --depth 1 "${REPO_URL}" main
          git -C "${VPS_DEPLOY_PATH}" reset --hard FETCH_HEAD
          git -C "${VPS_DEPLOY_PATH}" clean -fd

          docker compose -f "${VPS_DEPLOY_PATH}/docker-compose.yml" \
            --project-directory "${VPS_DEPLOY_PATH}" \
            up -d --build --remove-orphans

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1/healthz >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          echo "Application health check failed after deployment." >&2
          docker compose -f "${VPS_DEPLOY_PATH}/docker-compose.yml" \
            --project-directory "${VPS_DEPLOY_PATH}" \
            ps >&2 || true
          docker compose -f "${VPS_DEPLOY_PATH}/docker-compose.yml" \
            --project-directory "${VPS_DEPLOY_PATH}" \
            logs --tail=100 nginx >&2 || true
          docker compose -f "${VPS_DEPLOY_PATH}/docker-compose.yml" \
            --project-directory "${VPS_DEPLOY_PATH}" \
            logs --tail=100 api >&2 || true
          exit 1
          EOF

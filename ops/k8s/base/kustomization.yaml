apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: emr

resources:
  - namespace.yaml
  - postgres.yaml
  - api.yaml
  - loki.yaml
  - prometheus.yaml
  - grafana.yaml
  - promtail.yaml
  - ingress.yaml

configMapGenerator:
  - name: prometheus-config
    files:
      - prometheus.yml=assets/prometheus/prometheus.yml
  - name: loki-config
    files:
      - config.yml=assets/loki/config.yml
  - name: promtail-config
    files:
      - promtail.yml=assets/promtail/promtail.yml
  - name: grafana-datasources
    files:
      - datasources.yml=assets/grafana/provisioning/datasources/datasources.yml
  - name: grafana-dashboards-provider
    files:
      - dashboards.yml=assets/grafana/provisioning/dashboards/dashboards.yml
  - name: grafana-dashboards
    files:
      - emr-overview.json=assets/grafana/dashboards/emr-overview.json
      - emr-logs.json=assets/grafana/dashboards/emr-logs.json

generatorOptions:
  disableNameSuffixHash: true
